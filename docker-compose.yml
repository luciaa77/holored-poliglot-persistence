services:
  redis:
    image: redis:7-alpine
    container_name: holored-redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  cassandra:
    image: cassandra:4.1
    container_name: holored-cassandra
    ports:
      - "9042:9042"
    volumes:
      - cassandra_data:/var/lib/cassandra
    environment:
      - CASSANDRA_CLUSTER_NAME=HoloRedCluster
      - CASSANDRA_NUM_TOKENS=256
    restart: unless-stopped

  neo4j:
    image: neo4j:5
    container_name: holored-neo4j
    ports:
      - "7474:7474"   # web
      - "7687:7687"   # bolt
    environment:
      - NEO4J_AUTH=${NEO4J_USER}/${NEO4J_PASSWORD}
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped

volumes:
  redis_data:
  cassandra_data:
  neo4j_data:
  neo4j_logs: